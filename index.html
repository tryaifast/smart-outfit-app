<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能穿搭助手 - Smart Outfit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            min-height: 600px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        /* 登录注册 */
        .auth-page { padding: 40px 30px; }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e9ecef;
        }
        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-weight: 500;
        }
        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        .error-msg.show { display: block; }
        
        /* 主应用 */
        .main-app { display: none; }
        .main-app.show { display: block; }
        
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .nav-tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }
        .nav-tab.active {
            color: #667eea;
            background: white;
            border-bottom: 2px solid #667eea;
        }
        
        .section { display: none; padding: 20px; }
        .section.active { display: block; }
        
        /* 天气卡片 */
        .weather-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .location-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .weather-temp { font-size: 48px; font-weight: 300; }
        .weather-info { flex: 1; }
        .weather-desc { font-size: 18px; margin-bottom: 5px; }
        .weather-range { font-size: 14px; opacity: 0.9; }
        
        /* 场合选择 */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            padding: 10px 18px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .tag.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* 加载和结果 */
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.show { display: block; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .result-card {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-card.show { display: block; }
        
        /* 个人资料 */
        .profile-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .avatar-upload {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload .placeholder { font-size: 40px; }
        
        /* 定位弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .location-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .location-type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }
        .location-type-btn.active {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .province-select, .city-select, .district-select, .street-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 15px;
        }
        
        /* 后台管理入口 */
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        
        /* 后台管理 */
        .admin-page {
            display: none;
            padding: 30px;
        }
        .admin-page.show { display: block; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        .config-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录注册页面 -->
        <div class="auth-page" id="authPage">
            <div class="header">
                <h1>👗 智能穿搭助手</h1>
                <p>AI-powered outfit recommendations</p>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <div class="auth-form" id="loginForm">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <div class="error-msg" id="loginError"></div>
                <button class="btn" onclick="handleLogin()">登录</button>
            </div>
            
            <!-- 注册表单 -->
            <div class="auth-form" id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请设置密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regConfirmPassword" placeholder="请再次输入密码">
                </div>
                <div class="error-msg" id="regError"></div>
                <button class="btn" onclick="handleRegister()">注册</button>
            </div>
        </div>
        
        <!-- 主应用 -->
        <div class="main-app" id="mainApp">
            <div class="nav-tabs">
                <div class="nav-tab active" data-tab="recommend">智能推荐</div>
                <div class="nav-tab" data-tab="wardrobe">我的衣橱</div>
                <div class="nav-tab" data-tab="profile">个人资料</div>
            </div>
            
            <!-- 智能推荐 -->
            <div class="section active" id="recommend">
                <div class="weather-card">
                    <div class="location-selector" onclick="openLocationModal()">
                        <span>📍</span>
                        <span id="currentLocation">正在定位...</span>
                        <span>▼</span>
                    </div>
                    <div class="weather-main">
                        <div class="weather-temp" id="weatherTemp">--°</div>
                        <div class="weather-info">
                            <div class="weather-desc" id="weatherDesc">--</div>
                            <div class="weather-range" id="weatherRange">--</div>
                        </div>
                    </div>
                </div>
                
                <div class="occasion-section">
                    <div class="section-title">今天是什么场合？</div>
                    <div class="tag-container" id="occasionTags">
                        <div class="tag" data-value="important_meeting">重要会议</div>
                        <div class="tag" data-value="daily_work">普通上班</div>
                        <div class="tag" data-value="client_visit">客户拜访</div>
                        <div class="tag" data-value="party">派对聚会</div>
                        <div class="tag" data-value="date">约会</div>
                        <div class="tag" data-value="interview">面试</div>
                        <div class="tag" data-value="casual">休闲日常</div>
                    </div>
                </div>
                
                <button class="btn recommend-btn" onclick="getRecommendation()">获取穿搭建议</button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>AI正在为你搭配...</p>
                </div>
                
                <div class="result-card" id="resultCard">
                    <div id="outfitList"></div>
                    <div id="reasoningText"></div>
                </div>
            </div>
            
            <!-- 我的衣橱 -->
            <div class="section" id="wardrobe">
                <h3 style="margin-bottom: 15px;">添加衣物</h3>
                <div class="form-group">
                    <textarea id="newClothes" rows="4" placeholder="描述你的衣物，例如：
藏青色西装外套
白色丝质衬衫
黑色阔腿裤" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px; resize: vertical;"></textarea>
                </div>
                <button class="btn" onclick="addToWardrobe()" style="margin-bottom: 20px;">添加到衣橱</button>
                
                <h3 style="margin-bottom: 15px;">我的衣橱</h3>
                <div id="wardrobeList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
            
            <!-- 个人资料 -->
            <div class="section" id="profile">
                <div class="profile-header">
                    <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
                        <img id="avatarImg" style="display: none;">
                        <span class="placeholder" id="avatarPlaceholder">👤</span>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarUpload(event)">
                    <div class="profile-name" id="profileName">未设置昵称</div>
                    <div style="font-size: 14px; opacity: 0.9;" id="profilePhone">--</div>
                </div>
                
                <div style="padding: 20px;">
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="editNickname" placeholder="设置你的昵称">
                    </div>
                    <div class="form-group">
                        <label>性别</label>
                        <select id="editGender" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px;">
                            <option value="">请选择</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>年龄段</label>
                        <select id="editAgeRange" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px;">
                            <option value="">请选择</option>
                            <option value="18-25">18-25岁</option>
                            <option value="26-35">26-35岁</option>
                            <option value="36-45">36-45岁</option>
                            <option value="46+">46岁以上</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>月收入</label>
                        <select id="editIncome" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px;">
                            <option value="">请选择</option>
                            <option value="5k-10k">5k-10k</option>
                            <option value="10k-20k">10k-20k</option>
                            <option value="20k-30k">20k-30k</option>
                            <option value="30k+">30k+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>职业</label>
                        <input type="text" id="editOccupation" placeholder="例如：产品经理、设计师">
                    </div>
                    <div class="form-group">
                        <label>风格偏好</label>
                        <select id="editStyle" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px;">
                            <option value="">请选择</option>
                            <option value="minimalist">简约极简</option>
                            <option value="classic">经典优雅</option>
                            <option value="trendy">时尚潮流</option>
                            <option value="business">商务干练</option>
                            <option value="casual">休闲舒适</option>
                        </select>
                    </div>
                    <button class="btn" onclick="saveProfile()">保存资料</button>
                    <button class="btn" onclick="logout()" style="margin-top: 10px; background: #6c757d;">退出登录</button>
                </div>
            </div>
        </div>
        
        <!-- 定位选择弹窗 -->
        <div class="modal" id="locationModal">
            <div class="modal-content">
                <div class="modal-header">选择位置</div>
                <div class="location-type">
                    <div class="location-type-btn active" onclick="selectLocationType('auto')">📍 自动定位</div>
                    <div class="location-type-btn" onclick="selectLocationType('manual')">✏️ 手动选择</div>
                </div>
                
                <!-- 自动定位 -->
                <div id="autoLocationSection">
                    <button class="btn" onclick="getCurrentLocation()">获取当前位置</button>
                    <div id="locationStatus" style="margin-top: 15px; color: #666; text-align: center;"></div>
                </div>
                
                <!-- 手动选择 -->
                <div id="manualLocationSection" style="display: none;">
                    <select class="province-select" id="provinceSelect" onchange="onProvinceChange()">
                        <option value="">选择省份</option>
                    </select>
                    <select class="city-select" id="citySelect" onchange="onCityChange()">
                        <option value="">选择城市</option>
                    </select>
                    <select class="district-select" id="districtSelect">
                        <option value="">选择区县</option>
                    </select>
                    <input type="text" class="street-input" id="streetInput" placeholder="输入街道/小区（可选）">
                </div>
                
                <button class="btn" onclick="confirmLocation()" style="margin-top: 20px;">确定</button>
                <button class="btn" onclick="closeLocationModal()" style="margin-top: 10px; background: #6c757d;">取消</button>
            </div>
        </div>
        
        <!-- 后台管理页面 -->
        <div class="admin-page" id="adminPage">
            <div class="admin-header">
                <h2>🏢 管理后台</h2>
                <button class="btn" onclick="closeAdmin()" style="width: auto; padding: 10px 20px;">返回</button>
            </div>
            
            <div class="stat-card">
                <div style="color: #666; margin-bottom: 5px;">注册用户</div>
                <div class="stat-number" id="adminUserCount">0</div>
            </div>
            
            <div class="config-section">
                <h3 style="margin-bottom: 15px;">API配置</h3>
                <div class="form-group">
                    <label>API提供商</label>
                    <select id="apiProvider" style="width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px;">
                        <option value="aliyun">阿里云百炼</option>
                        <option value="kimi">Kimi (Moonshot)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="adminApiKey" placeholder="输入API Key">
                    <small style="color: #666; display: block; margin-top: 5px;">阿里云百炼: sk-xxx 格式 | Kimi: 从控制台获取</small>
                </div>
                <button class="btn" onclick="saveAdminConfig()">保存配置</button>
                <button class="btn" onclick="clearAdminConfig()" style="margin-top: 10px; background: #dc3545;">清除配置</button>
            </div>
            
            <div class="config-section">
                <h3 style="margin-bottom: 15px;">用户列表</h3>
                <div id="adminUserList"></div>
            </div>
        </div>
    </div>
    
    <!-- 后台管理入口 -->
    <div class="admin-link" onclick="openAdminLogin()" title="管理后台">⚙️</div>
    
    <!-- 后台登录弹窗 -->
    <div class="modal" id="adminLoginModal">
        <div class="modal-content">
            <div class="modal-header">管理员登录</div>
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="adminUsername" placeholder="请输入管理员账号">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="adminPassword" placeholder="请输入管理员密码">
            </div>
            <div class="error-msg" id="adminLoginError"></div>
            <button class="btn" onclick="handleAdminLogin()">登录</button>
            <button class="btn" onclick="closeAdminLogin()" style="margin-top: 10px; background: #6c757d;">取消</button>
        </div>
    </div>

    <script>
        // 强制清除旧版本缓存，确保使用阿里云百炼
        (function() {
            const savedProvider = localStorage.getItem('smart_outfit_api_provider');
            if (!savedProvider || savedProvider === 'kimi') {
                localStorage.setItem('smart_outfit_api_provider', 'aliyun');
                console.log('已强制设置API提供商为阿里云百炼');
            }
        })();
    </script>
    <script src="app.js?v=4"></script>
</body>
</html>
