<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能穿搭助手 - Smart Outfit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
            color: #666;
        }
        
        .nav-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }
        
        .content {
            padding: 25px;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .outfit-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .outfit-item .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            margin-right: 15px;
        }
        
        .outfit-item .info h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 2px;
        }
        
        .outfit-item .info p {
            font-size: 12px;
            color: #666;
        }
        
        .reasoning {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .reasoning h4 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .reasoning p {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .wardrobe-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .wardrobe-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .wardrobe-item:hover {
            border-color: #667eea;
        }
        
        .wardrobe-item.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .weather-info {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .weather-info .temp {
            font-size: 48px;
            font-weight: 300;
            margin-right: 20px;
        }
        
        .weather-info .details {
            text-align: left;
        }
        
        .weather-info .details .city {
            font-size: 18px;
            font-weight: 600;
        }
        
        .weather-info .details .desc {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .tag {
            display: inline-block;
            padding: 5px 12px;
            background: #e9ecef;
            border-radius: 20px;
            font-size: 12px;
            color: #555;
            margin: 5px 5px 0 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tag:hover,
        .tag.selected {
            background: #667eea;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .api-config {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .api-config h4 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👔 智能穿搭助手</h1>
            <p>基于天气、场合、个人风格的智能搭配推荐</p>
        </div>
        
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="recommend">智能推荐</div>
            <div class="nav-tab" data-tab="wardrobe">我的衣橱</div>
            <div class="nav-tab" data-tab="profile">个人资料</div>
            <div class="nav-tab" data-tab="settings">设置</div>
        </div>
        
        <div class="content">
            <!-- 智能推荐 -->
            <div class="section active" id="recommend">
                <div class="api-config" id="apiConfig">
                    <h4>⚠️ 请先配置API</h4>
                    <p style="font-size: 12px; color: #856404;">需要配置Kimi API Key才能使用智能推荐功能</p>
                </div>
                
                <div class="weather-info" id="weatherInfo">
                    <div class="temp">--°</div>
                    <div class="details">
                        <div class="city">获取天气中...</div>
                        <div class="desc">--</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>今天有什么安排？</label>
                    <div id="occasionTags">
                        <span class="tag" data-value="important_meeting">重要会议</span>
                        <span class="tag" data-value="daily_work">普通上班</span>
                        <span class="tag" data-value="client_visit">客户拜访</span>
                        <span class="tag" data-value="party">派对聚会</span>
                        <span class="tag" data-value="date">约会</span>
                        <span class="tag" data-value="interview">面试</span>
                        <span class="tag" data-value="casual">休闲日常</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>补充说明（可选）</label>
                    <textarea id="extraNotes" placeholder="例如：必须用某件衣服、不想穿裙子、要显得专业但不沉闷..."></textarea>
                </div>
                
                <button class="btn" id="recommendBtn" onclick="getRecommendation()">
                    获取穿搭建议
                </button>
                
                <div class="loading hidden" id="loading">正在分析...</div>
                
                <div class="result-card" id="resultCard">
                    <h3 style="margin-bottom: 15px; color: #333;">👔 推荐搭配</h3>
                    <div id="outfitList"></div>
                    <div class="reasoning">
                        <h4>📍 推荐理由</h4>
                        <div id="reasoningText"></div>
                    </div>
                </div>
            </div>
            
            <!-- 我的衣橱 -->
            <div class="section" id="wardrobe">
                <div class="form-group">
                    <label>添加衣物</label>
                    <textarea id="newClothes" placeholder="描述你的衣服，例如：
- 藏青色西装外套，修身款，适合正式场合
- 白色丝质衬衫，简约款
- 黑色阔腿裤，高腰"></textarea>
                </div>
                <button class="btn" onclick="addToWardrobe()">添加到衣橱</button>
                
                <h3 style="margin-top: 25px; margin-bottom: 15px; color: #333;">我的衣橱</h3>
                <div class="wardrobe-list" id="wardrobeList"></div>
            </div>
            
            <!-- 个人资料 -->
            <div class="section" id="profile">
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="nickname" placeholder="怎么称呼你？">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="">请选择</option>
                        <option value="female">女</option>
                        <option value="male">男</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>年龄段</label>
                    <select id="ageRange">
                        <option value="">请选择</option>
                        <option value="18-25">18-25岁</option>
                        <option value="26-30">26-30岁</option>
                        <option value="31-35">31-35岁</option>
                        <option value="36-40">36-40岁</option>
                        <option value="40+">40岁以上</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>月收入区间</label>
                    <select id="income">
                        <option value="">请选择</option>
                        <option value="5k-10k">5,000-10,000元</option>
                        <option value="10k-20k">10,000-20,000元</option>
                        <option value="20k-30k">20,000-30,000元</option>
                        <option value="30k+">30,000元以上</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>职业类型</label>
                    <select id="occupation">
                        <option value="">请选择</option>
                        <option value="office">办公室白领</option>
                        <option value="creative">创意/设计</option>
                        <option value="tech">技术/互联网</option>
                        <option value="finance">金融/法律</option>
                        <option value="sales">销售/商务</option>
                        <option value="freelance">自由职业</option>
                        <option value="student">学生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>个人风格偏好</label>
                    <select id="stylePreference">
                        <option value="">请选择</option>
                        <option value="minimalist">简约极简</option>
                        <option value="classic">经典优雅</option>
                        <option value="trendy">时尚潮流</option>
                        <option value="business">商务干练</option>
                        <option value="casual">休闲舒适</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>所在城市</label>
                    <input type="text" id="city" placeholder="例如：广州">
                </div>
                <button class="btn" onclick="saveProfile()">保存资料</button>
            </div>
            
            <!-- 设置 -->
            <div class="section" id="settings">
                <div class="form-group">
                    <label>Kimi API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的Kimi API Key">
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">你的API Key仅存储在本地浏览器中</p>
                </div>
                <button class="btn" onclick="saveSettings()">保存设置</button>
                
                <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <h4 style="margin-bottom: 10px; color: #333;">关于</h4>
                    <p style="font-size: 12px; color: #666; line-height: 1.6;">
                        智能穿搭助手 v1.0<br>
                        基于Kimi K2.5大模型<br>
                        数据本地存储，保护隐私
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
