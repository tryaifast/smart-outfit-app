<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>智能穿搭助手 - Smart Outfit</title>
    <style>
        :root {
            --primary-500: #FF6B9D;
            --primary-gradient: linear-gradient(135deg, #FF6B9D 0%, #C44569 100%);
            --accent-500: #00D9C0;
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --bg-tertiary: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --border-subtle: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: var(--bg-secondary); min-height: 100vh; }
        .app-header { background: var(--bg-tertiary); padding: 24px 20px; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 44px; height: 44px; background: var(--primary-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .brand-title { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #FF6B9D 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-page { padding: 24px; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .auth-tab { flex: 1; padding: 14px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 12px; color: var(--text-secondary); font-size: 15px; font-weight: 600; text-align: center; cursor: pointer; }
        .auth-tab.active { background: var(--primary-gradient); color: white; box-shadow: 0 0 20px rgba(255,107,157,0.4); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 12px; color: var(--text-primary); font-size: 16px; }
        .form-input:focus { outline: none; border-color: var(--primary-500); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .error-msg { display: none; color: #EF4444; font-size: 14px; margin-bottom: 16px; }
        .error-msg.show { display: block; }
        .main-app { display: none; }
        .main-app.show { display: block; padding-bottom: 80px; }
        .weather-card { background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; margin: 20px; }
        .section-card { background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; margin: 20px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 10px 18px; background: #2A2A2A; border: 1px solid var(--border-subtle); border-radius: 9999px; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
        .tag.selected { background: var(--primary-gradient); color: white; box-shadow: 0 0 16px rgba(255,107,157,0.4); }
        .generate-btn { width: calc(100% - 40px); margin: 0 20px 20px; padding: 20px; background: var(--primary-gradient); border: none; border-radius: 16px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; box-shadow: 0 0 30px rgba(255,107,157,0.4); }
        .result-card { display: none; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; margin: 20px; }
        .result-card.show { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: var(--bg-secondary); border-top: 1px solid var(--border-subtle); display: none; padding: 8px 0; }
        .bottom-nav.show { display: flex; }
        .nav-item { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: var(--text-secondary); }
        .nav-item.active { color: var(--primary-500); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">👗</div>
                <div class="brand-title">智能穿搭助手</div>
            </div>
        </header>
        <div class="auth-page" id="authPage">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">登录</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">注册</div>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="loginPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
                </div>
                <div class="error-msg" id="loginError"></div>
                <button class="btn btn-primary" onclick="handleLogin()">登录</button>
            </div>
            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="error-msg" id="regError"></div>
                <button class="btn btn-primary" onclick="handleRegister()">注册</button>
            </div>
        </div>
        <div class="main-app" id="mainApp">
            <div class="weather-card">
                <div class="section-title">📍 位置天气</div>
                <div id="weatherContent">加载中...</div>
            </div>
            <div class="section-card">
                <div class="section-title">🎯 场合选择</div>
                <div class="tag-container">
                    <span class="tag" onclick="toggleTag(this)">日常休闲</span>
                    <span class="tag" onclick="toggleTag(this)">职场通勤</span>
                    <span class="tag" onclick="toggleTag(this)">约会聚会</span>
                    <span class="tag" onclick="toggleTag(this)">运动健身</span>
                </div>
            </div>
            <button class="generate-btn" onclick="getRecommendation()">✨ 获取穿搭建议</button>
            <div class="result-card" id="resultCard">
                <div class="section-title">👔 AI 推荐</div>
                <div id="resultContent"></div>
            </div>
        </div>
        <nav class="bottom-nav" id="bottomNav">
            <div class="nav-item active" onclick="switchNav('home')">🏠<br>首页</div>
            <div class="nav-item" onclick="switchNav('wardrobe')">👕<br>衣橱</div>
            <div class="nav-item" onclick="switchNav('profile')">👤<br>我的</div>
        </nav>
    </div>
    <script src="js/config.js?v=15"></script>
    <script src="js/utils.js?v=15"></script>
    <script src="js/storage.js?v=15"></script>
    <script src="js/api.js?v=15"></script>
    <script src="js/weather.js?v=15"></script>
    <script src="js/user.js?v=15"></script>
    <script src="js/wardrobe.js?v=15"></script>
    <script src="js/ui.js?v=15"></script>
    <script src="js/app.js?v=15"></script>
</body>
</html>
